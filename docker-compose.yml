services:
  unmonitorr:
    image: ghcr.io/nicolas-gatta/unmonitorr:latest
    container_name: unmonitorr
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./data:/app/data   # persists settings saved via the /settings web page
    environment:
      - TZ=Europe/Brussels
      - LOG_LEVEL=INFO

