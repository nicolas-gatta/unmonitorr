<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}unmonitorr{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="topnav">
    <span class="brand">unmonitorr</span>
    <div class="nav-links">
      <a href="{{ url_for('dashboard.dashboard') }}"
         class="{{ 'active' if request.endpoint == 'dashboard.dashboard' else '' }}">Dashboard</a>
      <a href="{{ url_for('settings.settings_page') }}"
         class="{{ 'active' if request.endpoint == 'settings.settings_page' else '' }}">Settings</a>
    </div>
  </nav>
  <main class="page">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
